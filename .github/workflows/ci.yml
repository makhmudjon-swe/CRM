name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kodi
        uses: actions/checkout@v4

      - name: .NET 8 sozlash
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Paketlarni tiklash
        run: dotnet restore InventoryManagementService.sln

      - name: Build qilish (Release)
        run: dotnet build InventoryManagementService.sln --no-restore --configuration Release
