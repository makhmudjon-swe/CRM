version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm_web
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
    restart: unless-stopped
    networks:
      - crm_network

networks:
  crm_network:
    driver: bridge